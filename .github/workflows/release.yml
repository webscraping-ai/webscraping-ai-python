name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for PyPI trusted publishing (OIDC).

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/webscraping_ai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pytest pytest-asyncio respx httpx

      - name: Verify package version matches release tag
        run: |
          PKG_VERSION=$(python -c 'import sys; sys.path.insert(0, "src"); from webscraping_ai._version import __version__; print(__version__)')
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Package version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi

      - name: Run tests before release
        run: |
          python -m pip install -e .
          python -m pytest -q

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
